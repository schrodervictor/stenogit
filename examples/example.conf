# config-tracker per-instance configuration
#
# Lives at: ~/.config/config-tracker/<name>.conf
# Loaded by the systemd unit via EnvironmentFile=.
# The instance name comes from the systemd template (%i) and is
# injected as INSTANCE=, not stored here.

DIR=/etc/nginx
MESSAGE_TEMPLATE=auto: nginx {date} ({count} files)
DEBOUNCE=5
